name: Complete Phase 2

on:
  push:
    branches:
      - feature/configurable-assessment-framework
    paths:
      - .github/workflows/phase2-complete.yml
      - .phase2-payload/**

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Phase 2 branch
        uses: actions/checkout@v4
        with:
          ref: feature/configurable-assessment-framework
          fetch-depth: 0

      - name: Apply verified Phase 2 patch
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(.phase2-payload/part-*.patch)
          test "${#parts[@]}" -ge 16
          cat "${parts[@]}" > /tmp/phase2-complete.patch
          git apply --check /tmp/phase2-complete.patch
          git apply /tmp/phase2-complete.patch
          rm -rf .phase2-payload
          git rm .github/workflows/phase2-complete.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete Phase 2 configurable assessment framework"
          git push origin HEAD:feature/configurable-assessment-framework
