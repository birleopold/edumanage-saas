name: Apply institutional completion

# One-time assembly workflow. It deletes itself after applying the validated payload.
on:
  push:
    branches:
      - agent/institutional-ux-observability
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-institutional-completion
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, 'Complete institutional education roadmap') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply validated source payload
        shell: bash
        run: |
          set -euo pipefail
          cat .github/institutional-payload/chunk-* > /tmp/institutional-payload.b64
          base64 --decode /tmp/institutional-payload.b64 > /tmp/institutional-payload.tar.gz
          tar -xzf /tmp/institutional-payload.tar.gz
          rm -rf .github/institutional-payload
          rm -f .github/workflows/apply-institutional.yml
          rm -f .github/workflows/source-export.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to apply"
            exit 0
          fi

          git commit -m "Complete institutional education roadmap"
          git push origin HEAD:agent/institutional-ux-observability
