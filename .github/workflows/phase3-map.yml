name: Phase 3 repository map

on:
  push:
    branches:
      - feature/unified-learning-activities

permissions:
  contents: write

jobs:
  map:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/unified-learning-activities
          fetch-depth: 0
      - name: Record coursework repository map
        run: |
          {
            echo "COURSEWORK FILES"
            find apps/tenant/coursework -maxdepth 3 -type f | sort
            echo
            echo "PORTAL COURSEWORK TEMPLATES"
            find templates -path '*coursework*' -type f | sort
            echo
            echo "COURSEWORK ROUTE REFERENCES"
            grep -R "coursework" -n config apps/tenant/portals 2>/dev/null | head -300 || true
          } > phase3_repo_map.txt
      - name: Commit repository map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add phase3_repo_map.txt
          git commit -m "Record Phase 3 repository map"
          git push origin HEAD:feature/unified-learning-activities
