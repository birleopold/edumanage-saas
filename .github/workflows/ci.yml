name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    name: Django quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Check dependency lifecycle
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production-but-long-enough-for-deploy-checks
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py check_dependency_lifecycle --strict

      - name: Check release gates
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production-but-long-enough-for-deploy-checks
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          DJANGO_SECURE_HSTS_PRELOAD: "True"
          POSTGRES_PASSWORD: ci-postgres-password
          ADMIN_2FA_REQUIRED: "True"
          PAYMENT_CALLBACKS_ENABLED: "False"
          MOBILE_MONEY_DRY_RUN_ENABLED: "False"
          WEBHOOK_ALLOW_PRIVATE_TARGETS: "False"
        run: python manage.py check_release_gates --strict

      - name: Check access-control evidence
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production-but-long-enough-for-deploy-checks
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py check_access_control_evidence --strict

      - name: Check migration drift
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production-but-long-enough-for-deploy-checks
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django checks
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production-but-long-enough-for-deploy-checks
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py check

      - name: Run production deploy checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production-but-long-enough-for-deploy-checks
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          POSTGRES_DB: edumanage_saas
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5432"
          DJANGO_SECURE_HSTS_PRELOAD: "True"
          ADMIN_2FA_REQUIRED: "True"
          PAYMENT_CALLBACKS_ENABLED: "False"
          MOBILE_MONEY_DRY_RUN_ENABLED: "False"
          WEBHOOK_ALLOW_PRIVATE_TARGETS: "False"
        run: python manage.py check --deploy

      - name: Verify template routes
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production-but-long-enough-for-deploy-checks
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python verify_routes.py

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production-but-long-enough-for-deploy-checks
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py test

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt

  postgres-tenant-isolation:
    name: PostgreSQL tenant isolation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: edumanage_saas
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d edumanage_saas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tenant tests against PostgreSQL schemas
        env:
          DJANGO_SETTINGS_MODULE: config.settings.tenants
          DJANGO_SECRET_KEY: ci-tenant-secret-key-not-for-production
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          POSTGRES_DB: edumanage_saas
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5432"
        run: |
          python manage.py check --settings=config.settings.tenants
          python manage.py test apps.public.tenants.tests --settings=config.settings.tenants
