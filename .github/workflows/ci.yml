name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: role-continuity-bootstrap-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply-role-continuity:
    name: Apply verified role continuity patch
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/role-continuity-hardening'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Reconstruct payload
        shell: bash
        run: |
          set -euo pipefail
          test -d .role-continuity-payload
          test "$(find .role-continuity-payload -maxdepth 1 -name 'segment-*' -type f | wc -l)" -eq 9
          cat .role-continuity-payload/segment-* > /tmp/role-continuity.tar.gz.b64
          base64 --decode /tmp/role-continuity.tar.gz.b64 > /tmp/role-continuity.tar.gz
          test -s /tmp/role-continuity.tar.gz

      - name: Verify payload checksum
        shell: bash
        run: |
          set -euo pipefail
          echo '3ae0d24e68ac7eec4650de55cbb587a049e5c9877a22502c8836a398fc6db785  /tmp/role-continuity.tar.gz' | sha256sum --check --strict

      - name: Verify archive paths
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib
          import tarfile

          archive = pathlib.Path('/tmp/role-continuity.tar.gz')
          with tarfile.open(archive, 'r:gz') as handle:
              for member in handle.getmembers():
                  path = pathlib.PurePosixPath(member.name)
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'Unsafe archive path: {member.name}')
          PY

      - name: Extract and compile reviewed source
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/role-continuity.tar.gz
          python -m compileall -q apps config
          test -f apps/tenant/portals/role_navigation.py

      - name: Remove staging material
        shell: bash
        run: |
          set -euo pipefail
          rm -rf \
            .role-continuity-payload \
            .role-continuity-trigger \
            .github/workflows/apply-role-continuity-hardening.yml

      - name: Commit complete source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          test -n "$(git status --short)"
          git commit -m 'Harden role continuity and campus isolation'
          git push origin HEAD:${GITHUB_HEAD_REF}
