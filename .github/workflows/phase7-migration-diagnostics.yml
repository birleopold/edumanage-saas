name: Phase 7 migration diagnostics

on:
  push:
    branches:
      - feature/boarding-welfare-consolidation

jobs:
  migration-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Capture migration drift
        env:
          DJANGO_SECRET_KEY: diagnostic-secret-key-long-enough-for-phase-seven
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py makemigrations --dry-run --verbosity 3 > phase7-migration-drift.log 2>&1 || true
          cat phase7-migration-drift.log
      - name: Upload migration drift
        uses: actions/upload-artifact@v4
        with:
          name: phase7-migration-drift
          path: phase7-migration-drift.log
          if-no-files-found: error
