name: Phase 9 migration diagnostic

on:
  pull_request:
    branches: [main]

jobs:
  generate-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate exact finance migration
        env:
          DJANGO_SECRET_KEY: phase9-diagnostic-secret-key-long-enough
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          mkdir -p phase9-diagnostic
          ls -1 apps/tenant/finance/migrations > phase9-diagnostic/migrations-before.txt
          python manage.py makemigrations finance
          ls -1 apps/tenant/finance/migrations > phase9-diagnostic/migrations-after.txt
          cp apps/tenant/finance/migrations/*.py phase9-diagnostic/

      - name: Upload generated migration
        uses: actions/upload-artifact@v4
        with:
          name: phase9-generated-migration
          path: phase9-diagnostic/
          if-no-files-found: error
