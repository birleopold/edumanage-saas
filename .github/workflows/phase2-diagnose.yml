name: Phase 2 source cleanup diagnostic

on:
  push:
    branches:
      - feature/configurable-assessment-framework
    paths:
      - .github/workflows/phase2-diagnose.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/configurable-assessment-framework
          fetch-depth: 0
      - name: Remove remaining patch markers and rescan Python
        run: |
          sed -i 's/^+            weight=30,/            weight=30,/' apps/tenant/assessments/test_phase2_framework.py
          sed -i 's/^+    components = list/    components = list/' apps/tenant/assessments/services.py
          sed -i 's/^+            "total_weight",/            "total_weight",/' apps/tenant/assessments/forms.py
          sed -i 's/^+            tenants =/            tenants =/' apps/tenant/assessments/management/commands/bootstrap_assessment_frameworks.py
          grep -R -n '^[+]' apps/tenant/assessments apps/tenant/exams --include='*.py' > phase2-diagnostic.txt || true
      - name: Commit cleanup and scan output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/tenant/assessments phase2-diagnostic.txt
          git commit -m "Remove remaining Phase 2 patch markers" || exit 0
          git push origin HEAD:feature/configurable-assessment-framework
