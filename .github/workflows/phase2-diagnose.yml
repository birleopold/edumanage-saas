name: Phase 2 source cleanup diagnostic

on:
  push:
    branches:
      - feature/configurable-assessment-framework
    paths:
      - .github/workflows/phase2-diagnose.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/configurable-assessment-framework
          fetch-depth: 0
      - name: Remove patch marker and scan Python sources
        run: |
          sed -i 's/^+@role_required/@role_required/' apps/tenant/assessments/admin_views.py
          grep -R -n '^[+]' apps/tenant/assessments apps/tenant/exams --include='*.py' > phase2-diagnostic.txt || true
      - name: Commit cleanup and scan output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/tenant/assessments/admin_views.py phase2-diagnostic.txt
          git commit -m "Remove Phase 2 patch marker and scan sources" || exit 0
          git push origin HEAD:feature/configurable-assessment-framework
