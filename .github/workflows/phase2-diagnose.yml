name: Phase 2 lifecycle diagnostic

on:
  push:
    branches:
      - feature/configurable-assessment-framework
    paths:
      - .github/workflows/phase2-diagnose.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Record lifecycle checks
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production-but-long-enough-for-deploy-checks
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py check_dependency_lifecycle --json > phase2-lifecycle.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: phase2-lifecycle-diagnostic
          path: phase2-lifecycle.json
          if-no-files-found: error
