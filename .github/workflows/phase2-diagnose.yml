name: Phase 2 lifecycle diagnostic

on:
  push:
    branches:
      - feature/configurable-assessment-framework
    paths:
      - .github/workflows/phase2-diagnose.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/configurable-assessment-framework
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Capture lifecycle startup and checks
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production-but-long-enough-for-deploy-checks
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py check_dependency_lifecycle --json > phase2-diagnostic.txt 2>&1 || true
      - name: Commit diagnostic output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add phase2-diagnostic.txt
          git commit -m "Record Phase 2 lifecycle diagnostic" || exit 0
          git push origin HEAD:feature/configurable-assessment-framework
