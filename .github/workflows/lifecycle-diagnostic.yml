name: Lifecycle diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Capture lifecycle checks and traceback
        env:
          DJANGO_SECRET_KEY: ci-secret-key-not-for-production-but-long-enough-for-deploy-checks
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          set +e
          python manage.py check_dependency_lifecycle --json > lifecycle-diagnostic.txt 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> lifecycle-diagnostic.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: lifecycle-diagnostic
          path: lifecycle-diagnostic.txt
          if-no-files-found: error
