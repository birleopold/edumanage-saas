name: Source export

on:
  push:
    branches:
      - agent/institutional-ux-observability
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create source archive
        run: zip -r edumanage-source.zip . -x '.git/*' 'edumanage-source.zip'
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: edumanage-source
          path: edumanage-source.zip
          retention-days: 1
          if-no-files-found: error
