{% extends 'portals/admin/base.html' %}
{% load history_tags %}
{% block title %}Transaction{% endblock %}
{% block content %}
<div class="space-y-6">
  <a href="{% url 'admin_invoices_detail' invoice.id %}" class="text-primary-700 font-bold">Back to invoice</a>
  <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="text-xl font-black text-slate-950">Transaction {{ payment.id }}</h1>
    <p class="mt-2 text-sm text-slate-600">Reference: {{ payment.reference|default:'-' }}</p>
  </section>
  {% history_timeline payment "Transaction Timeline" %}
</div>
{% endblock %}
