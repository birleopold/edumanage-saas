{% extends 'portals/admin/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
  <h1>{{ title }}</h1>

  <p>
    <a href="{% url create_url_name %}">Add</a>
  </p>

  <div class='overflow-x-auto bg-white rounded-xl shadow-sm border border-gray-200 mt-6'><table class='min-w-full divide-y divide-gray-200'>
    <thead class='bg-gray-50' class=\'px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider\'>
      <tr>
        <th class=\'px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider\'>ID</th>
        <th class=\'px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider\'>Item</th>
        <th class=\'px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider\'>Actions</th>
      </tr>
    </thead>
    <tbody class='bg-white divide-y divide-gray-200'>
      {% for obj in objects %}
        <tr>
          <td class=\'px-6 py-4 whitespace-nowrap text-sm text-gray-700\'>{{ obj.id }}</td>
          <td class=\'px-6 py-4 whitespace-nowrap text-sm text-gray-700\'>{{ obj }}</td>
          <td class=\'px-6 py-4 whitespace-nowrap text-sm text-gray-700\'>
            <a href="{% url edit_url_name obj.id %}">Edit</a>
          </td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="3" class=\'px-6 py-4 whitespace-nowrap text-sm text-gray-700\'>No records yet.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table></div>
{% endblock %}
