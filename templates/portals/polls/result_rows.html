<section class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">
  <div class="border-b border-slate-100 px-6 py-4"><h2 class="font-black text-slate-950">Results</h2></div>
  <div class="divide-y divide-slate-100">
    {% for row in results %}
      <div class="p-5"><span class="font-bold text-slate-900">{{ row.option.option_text }}</span> <span class="font-black text-slate-900">{{ row.votes }} response(s), {{ row.percentage }}%</span></div>
    {% empty %}<div class="p-8 text-center text-slate-500">No results yet.</div>{% endfor %}
  </div>
</section>
