<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Card - {{ student }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media print { .no-print { display: none !important; } body { background: white !important; } }
  </style>
</head>
<body class="bg-gray-100 text-gray-900">
  <main class="max-w-5xl mx-auto p-6">
    <div class="no-print flex justify-end mb-4">
      <button onclick="window.print()" class="px-4 py-2 bg-blue-700 text-white rounded-lg font-semibold">Print</button>
    </div>
    <section class="bg-white border border-gray-200 rounded-xl p-6 mb-6">
      <h1 class="text-2xl font-black">Report Card</h1>
      <p class="text-sm text-gray-600 mt-1">Student: {{ student }}</p>
      {% if student.campus %}<p class="text-sm text-gray-600">Campus: {{ student.campus }}</p>{% endif %}
      {% if student.stream %}<p class="text-sm text-gray-600">Class/Stream: {{ student.stream }}</p>{% endif %}
    </section>
    {% include "portals/results/_report_card_body.html" %}
  </main>
</body>
</html>
