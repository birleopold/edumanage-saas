<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Login | EduManage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="min-h-full bg-gradient-to-br from-slate-950 via-blue-950 to-slate-900 text-white">
  <main class="flex min-h-screen items-center justify-center px-5 py-10">
    <section class="w-full max-w-md rounded-[2rem] border border-white/10 bg-white/10 p-8 shadow-2xl backdrop-blur-xl">
      <div class="mb-7 text-center">
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-3xl bg-white text-blue-800 shadow-xl">
          <i class="ph-fill ph-shield-checkered text-3xl"></i>
        </div>
        <h1 class="mt-5 text-2xl font-black">Platform Admin Console</h1>
        <p class="mt-2 text-sm font-semibold text-blue-100">Superuser access only for SaaS tenant and domain operations.</p>
      </div>

      {% if messages %}
        <div class="mb-5 space-y-2">
          {% for message in messages %}
            <div class="rounded-2xl bg-white/10 px-4 py-3 text-sm font-bold text-white ring-1 ring-white/15">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label for="{{ form.username.id_for_label }}" class="mb-2 block text-sm font-black text-blue-100">Username</label>
          <input type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" value="{{ form.username.value|default:'' }}" required autofocus class="block w-full rounded-2xl border-2 border-white/10 bg-white px-4 py-3 text-sm font-bold text-slate-950 outline-none focus:border-blue-300 focus:ring-4 focus:ring-blue-400/30">
        </div>
        <div>
          <label for="{{ form.password.id_for_label }}" class="mb-2 block text-sm font-black text-blue-100">Password</label>
          <input type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" required class="block w-full rounded-2xl border-2 border-white/10 bg-white px-4 py-3 text-sm font-bold text-slate-950 outline-none focus:border-blue-300 focus:ring-4 focus:ring-blue-400/30">
        </div>
        <button type="submit" class="w-full rounded-2xl bg-white px-5 py-3 text-sm font-black text-blue-900 shadow-xl hover:bg-blue-50">
          <i class="ph ph-lock-key-open mr-1"></i> Sign in securely
        </button>
      </form>
    </section>
  </main>
</body>
</html>
