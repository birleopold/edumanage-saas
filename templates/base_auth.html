<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}EduManage{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}.floating{animation:float 7s ease-in-out infinite}</style>
    {% include "components/ui_public_polish.html" %}
  </head>
  <body class="min-h-screen bg-slate-950 flex items-center justify-center p-4 public-fade-in relative overflow-hidden">
    <a href="#auth-main" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-white border border-gray-300 rounded px-3 py-2 text-sm z-50 shadow">Skip to main content</a>
    <div class="absolute inset-0 overflow-hidden pointer-events-none" aria-hidden="true"><div class="absolute -top-24 -right-16 h-96 w-96 rounded-full bg-blue-500/20 blur-3xl floating"></div><div class="absolute bottom-0 -left-20 h-96 w-96 rounded-full bg-purple-500/20 blur-3xl floating" style="animation-delay:-3s"></div></div>
    <div class="relative z-10 w-full max-w-md">
      {% block auth_pre_card %}{% endblock %}
      <main id="auth-main" tabindex="-1" class="outline-none">
        <div class="bg-white rounded-[1.75rem] shadow-2xl p-8 public-card border border-white/70{% block auth_card_extra_class %}{% endblock %}">{% block auth_content %}{% endblock %}</div>
      </main>
      {% block auth_footer %}<div class="mt-6 text-center text-blue-100 text-sm"><p>&copy; {% now "Y" %} EduManage. All rights reserved.</p></div>{% endblock %}
    </div>
  </body>
</html>
