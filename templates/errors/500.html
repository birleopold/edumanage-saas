<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Server Error - EduManage</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
      .container { background: white; padding: 60px 40px; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 500px; text-align: center; }
      .error-code { font-size: 72px; font-weight: 700; color: #e53e3e; margin-bottom: 16px; }
      h1 { color: #1a202c; font-size: 28px; margin-bottom: 12px; }
      p { color: #718096; font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
      .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
      .btn { padding: 12px 24px; border-radius: 8px; font-weight: 600; text-decoration: none; transition: transform 0.2s; display: inline-block; }
      .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
      .btn-secondary { background: #f3f4f6; color: #374151; }
      .btn:hover { transform: translateY(-2px); }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">500</div>
      <h1>Something Went Wrong</h1>
      <p>We're sorry, but something went wrong on our end. Our team has been notified and we're working to fix it.</p>
      <div class="btn-group">
        <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
        <a href="/" class="btn btn-primary">Go Home</a>
      </div>
    </div>
  </body>
</html>
