{% if poll_dashboard_items %}
<section class="rounded-2xl border border-indigo-100 bg-indigo-50 p-5 shadow-sm">
  <div class="mb-4 flex items-center justify-between">
    <h3 class="font-black text-slate-950">Polls</h3>
    <a href="{% url 'poll_list' %}" class="text-sm font-bold text-indigo-700">View all</a>
  </div>
  <div class="grid gap-3 md:grid-cols-3">
    {% for item in poll_dashboard_items %}
      <a href="{% url 'poll_detail' item.id %}" class="rounded-xl border border-indigo-100 bg-white p-4">
        <h4 class="font-black text-slate-950">{{ item.title }}</h4>
        <p class="mt-2 text-xs text-slate-500">{{ item.get_total_votes }} response(s)</p>
      </a>
    {% endfor %}
  </div>
</section>
{% endif %}
