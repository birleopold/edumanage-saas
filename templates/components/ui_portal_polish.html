<style>
  /* Global polish layer for visual consistency and smoother feel */
  :root {
    --ui-ease: 220ms cubic-bezier(0.22, 1, 0.36, 1);
    --role-accent: #3b82f6;
    --role-accent-soft: rgba(59, 130, 246, 0.12);
    --role-accent-deep: #1d4ed8;
    --motion-multiplier: 1;
  }

  body.role-admin {
    --role-accent: #4f46e5;
    --role-accent-soft: rgba(79, 70, 229, 0.12);
    --role-accent-deep: #312e81;
  }
  body.role-teacher {
    --role-accent: #7c3aed;
    --role-accent-soft: rgba(124, 58, 237, 0.12);
    --role-accent-deep: #4c1d95;
  }
  body.role-student {
    --role-accent: #0d9488;
    --role-accent-soft: rgba(13, 148, 136, 0.14);
    --role-accent-deep: #134e4a;
  }
  body.role-parent {
    --role-accent: #e11d48;
    --role-accent-soft: rgba(225, 29, 72, 0.12);
    --role-accent-deep: #881337;
  }

  [x-cloak] {
    display: none !important;
  }

  aside nav a:focus-visible,
  aside nav button:focus-visible {
    outline: 2px solid var(--role-accent-deep);
    outline-offset: 2px;
  }

  main .rounded-xl,
  main .rounded-lg,
  main table,
  main input,
  main select,
  main textarea,
  main button,
  main a {
    transition: all var(--ui-ease);
  }

  main .shadow-sm:hover,
  main .shadow-md:hover {
    box-shadow: 0 14px 28px -18px rgba(15, 23, 42, 0.35);
  }

  main .border-gray-200:hover {
    border-color: #cbd5e1;
  }

  main input:focus,
  main select:focus,
  main textarea:focus {
    outline: none;
    box-shadow: 0 0 0 3px var(--role-accent-soft);
    border-color: var(--role-accent);
  }

  /* Keyboard focus visibility (WCAG 2.4.7) — keep mouse clicks clean */
  main a:focus-visible,
  main button:focus-visible,
  main input:focus-visible,
  main select:focus-visible,
  main textarea:focus-visible,
  main summary:focus-visible {
    outline: 2px solid var(--role-accent-deep);
    outline-offset: 2px;
  }

  main thead th {
    letter-spacing: 0.03em;
  }

  main tbody tr:hover td {
    background-color: rgba(248, 250, 252, 0.8);
  }

  main .page-fade-in {
    animation: pageFadeIn 0.32s ease-out;
  }

  main .bg-primary-600,
  main .hover\:bg-primary-700:hover {
    filter: saturate(1.02) contrast(1.02);
  }

  /* Cinematic reveal system */
  main .cinematic-item {
    opacity: 0;
    transform: translateY(10px) scale(0.995);
    animation: cinematicIn calc(520ms * var(--motion-multiplier)) var(--ui-ease) forwards;
  }

  main .cinematic-grid > *:nth-child(1) { animation-delay: calc(35ms * var(--motion-multiplier)); }
  main .cinematic-grid > *:nth-child(2) { animation-delay: calc(80ms * var(--motion-multiplier)); }
  main .cinematic-grid > *:nth-child(3) { animation-delay: calc(125ms * var(--motion-multiplier)); }
  main .cinematic-grid > *:nth-child(4) { animation-delay: calc(170ms * var(--motion-multiplier)); }
  main .cinematic-grid > *:nth-child(5) { animation-delay: calc(215ms * var(--motion-multiplier)); }
  main .cinematic-grid > *:nth-child(6) { animation-delay: calc(260ms * var(--motion-multiplier)); }
  main .cinematic-grid > *:nth-child(n+7) { animation-delay: calc(305ms * var(--motion-multiplier)); }

  @keyframes cinematicIn {
    from { opacity: 0; transform: translateY(10px) scale(0.995); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Page-level motion tuning */
  .motion-fast {
    --motion-multiplier: .62;
  }
  .motion-fast .cinematic-item {
    transform: translateY(6px) scale(0.998);
  }
  .motion-rich {
    --motion-multiplier: 1.18;
  }
  .motion-rich .cinematic-item {
    transform: translateY(14px) scale(0.992);
  }

  /* Sticky action bars: cinematic glow */
  main .sticky-cinematic {
    border: 1px solid color-mix(in srgb, var(--role-accent) 20%, #e5e7eb);
    box-shadow: 0 -10px 25px -18px color-mix(in srgb, var(--role-accent) 35%, transparent);
    backdrop-filter: blur(8px);
  }

  /* Badge palette normalization */
  main .inline-flex.rounded-full,
  main span.rounded-full {
    letter-spacing: 0.01em;
    font-weight: 700;
  }

  main .bg-green-100.text-green-700,
  main .bg-green-100.text-green-800 { background-color: #dcfce7; color: #166534; }
  main .bg-blue-100.text-blue-700,
  main .bg-blue-100.text-blue-800 { background-color: #dbeafe; color: #1e40af; }
  main .bg-yellow-100.text-yellow-700,
  main .bg-yellow-100.text-yellow-800 { background-color: #fef3c7; color: #92400e; }
  main .bg-red-100.text-red-700,
  main .bg-red-100.text-red-800 { background-color: #fee2e2; color: #991b1b; }
  main .bg-gray-100.text-gray-700,
  main .bg-gray-100.text-gray-800 { background-color: #f3f4f6; color: #374151; }

  main a:hover {
    text-decoration-thickness: 1.5px;
    text-underline-offset: 2px;
  }

  @keyframes pageFadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const mainContent = document.querySelector('main');
    if (mainContent) {
      mainContent.classList.add('page-fade-in');

      const grids = mainContent.querySelectorAll('.grid');
      grids.forEach((grid) => {
        const children = Array.from(grid.children || []);
        if (children.length >= 2 && !grid.classList.contains('cinematic-grid')) {
          grid.classList.add('cinematic-grid');
          children.forEach((child) => {
            if (!child.classList.contains('cinematic-item')) {
              child.classList.add('cinematic-item');
            }
          });
        }
      });

      const stickyBars = mainContent.querySelectorAll('.sticky');
      stickyBars.forEach((el) => el.classList.add('sticky-cinematic'));
    }
  });
</script>
