<style>
  :root {
    --public-ease: 260ms cubic-bezier(0.22, 1, 0.36, 1);
  }

  .public-surface {
    backdrop-filter: blur(8px);
  }

  .public-card,
  .public-btn,
  .public-input,
  a,
  button {
    transition: all var(--public-ease);
  }

  .public-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 36px -20px rgba(15, 23, 42, 0.45);
  }

  .public-input:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.24);
  }

  .public-btn:hover {
    transform: translateY(-1px);
  }

  .public-input:focus-visible,
  .public-btn:focus-visible,
  a:focus-visible,
  button:focus-visible {
    outline: 3px solid rgba(255, 255, 255, 0.6);
    outline-offset: 2px;
  }

  .public-fade-in {
    animation: publicFadeIn 0.42s ease-out;
  }

  .public-stagger > * {
    opacity: 0;
    transform: translateY(8px);
    animation: publicFadeIn 0.48s ease-out forwards;
  }
  .public-stagger > *:nth-child(1) { animation-delay: 40ms; }
  .public-stagger > *:nth-child(2) { animation-delay: 85ms; }
  .public-stagger > *:nth-child(3) { animation-delay: 130ms; }
  .public-stagger > *:nth-child(4) { animation-delay: 175ms; }

  @keyframes publicFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
