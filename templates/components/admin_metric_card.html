<a href="{{ url|default:'#' }}" class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition hover:-translate-y-1 hover:border-primary-300 hover:shadow-lg">
  <p class="text-xs font-black uppercase tracking-wide text-slate-500">{{ label }}</p>
  <p class="mt-2 text-3xl font-black text-slate-950">{{ value|default:'—' }}</p>
  {% if description %}<p class="mt-2 text-sm text-slate-500">{{ description }}</p>{% endif %}
</a>
