<section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
  <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
    <div>
      <p class="text-xs font-black uppercase tracking-[0.18em] text-primary-600">{{ eyebrow|default:'Admin Center' }}</p>
      <h1 class="mt-2 text-2xl font-black text-slate-950">{{ title }}</h1>
      {% if subtitle %}<p class="mt-2 text-sm text-slate-600">{{ subtitle }}</p>{% endif %}
    </div>
    {% if action_url and action_label %}<a href="{{ action_url }}" class="rounded-xl bg-primary-600 px-4 py-2 text-sm font-bold text-white">{{ action_label }}</a>{% endif %}
  </div>
</section>
