{% comment %}
Reusable action link.
Usage: {% include "components/ui_action_link.html" with href=url label="Edit" icon="pencil-simple" %}
{% endcomment %}

<a href="{{ href }}" class="inline-flex items-center justify-center gap-1 rounded-xl px-4 py-2 text-sm font-black {% if variant == 'secondary' %}border border-slate-200 bg-white text-slate-700 hover:border-primary-300{% elif variant == 'danger' %}bg-red-600 text-white hover:bg-red-700{% else %}bg-primary-600 text-white hover:bg-primary-700{% endif %}">
  {% if icon %}<i class="ph ph-{{ icon }}" aria-hidden="true"></i>{% endif %}
  {{ label|default:"Open" }}
</a>
